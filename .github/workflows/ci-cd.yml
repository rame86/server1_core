#Core Service/ CI-CD
name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME=${{ secrets.DOCKER_USERNAME }}/server1_core
          docker build -t $IMAGE_NAME:latest .
          docker push $IMAGE_NAME:latest

      # 1. GitHub Actions 러너의 공용 IP 가져오기
      - name: Get Runner IP
        id: ip
        run: echo "ipv4=$(curl -s https://api.ipify.org)" >> $GITHUB_OUTPUT

      # 2. GCP 인증
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3. gcloud SDK 설정
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # 4. SSH 포트 일시 허용 (방화벽 규칙 생성)
      - name: Open Firewall for Deployment
        run: |
          gcloud compute firewall-rules create allow-ssh-${{ github.run_id }} \
            --direction=INGRESS \
            --priority=100 \
            --action=ALLOW \
            --rules=tcp:22 \
            --source-ranges=${{ steps.ip.outputs.ipv4 }}/32 \
            --description="Temporary SSH access for GitHub Actions"

      # 5. docker-compose 파일 전송
      - name: Copy docker-compose to GCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.GCP_USER }}/core-service/"

      # 6. 원격 배포 실행 및 .env 파일 동적 생성
      - name: Deploy to GCP
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.GCP_HOST }}
          username: ${{ secrets.GCP_USER }}
          key: ${{ secrets.GCP_KEY }}                  
          script: |            
            # [예외 처리] 도커 볼륨 마운트 전 호스트 디렉토리를 미리 생성하여 root 권한으로 폴더가 생성되는 문제 방지
            mkdir -p /home/${{ secrets.GCP_USER }}/images/core
            
            mkdir -p /home/${{ secrets.GCP_USER }}/core-service
            cd /home/${{ secrets.GCP_USER }}/core-service
            
            docker network inspect msa-network >/dev/null 2>&1 || docker network create msa-network
            
            cat <<EOF > .env
            SPRING_PROFILES_ACTIVE=prod

            SPRING_DATASOURCE_URL=jdbc:postgresql://main-db:5432/msa_core_db
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            GCP_SERVER_1=${{ secrets.GCP_SERVER_1 }}
            RABBITMQ_HOST=rabbitmq
            RABBITMQ_PORT=${{ secrets.RABBITMQ_PORT }}
            RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}
            RABBITMQ_PASSWORD=${{ secrets.RABBITMQ_PASSWORD }}
            REDIS_HOST=msa-redis
            REDIS_PORT=${{ secrets.REDIS_PORT }}
            TZ=Asia/Seoul
            EOF
            
            docker compose pull
            docker compose up -d
            
            docker image prune -f

      # 7. 방화벽 규칙 삭제 (성공/실패 여부 상관없이 항상 실행)
      - name: Close Firewall
        if: always()
        run: |
          gcloud compute firewall-rules delete allow-ssh-${{ github.run_id }} --quiet