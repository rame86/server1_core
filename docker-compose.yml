#core-service/ docker_compose.yml
version: '3.8'

services:
  # 1. Redis 서비스 추가
  msa-redis:
    image: redis:alpine
    container_name: msa-redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - msa-network

  # 2. Core Service 설정
  core-service:
    image: ssrabw/server1_core:latest
    container_name: core-service
    restart: always
    ports:
      - "8080:8080"
    networks:
      - msa-network    
    volumes:
      - /home/ubuntu/msa/storage:/home/ubuntu/msa/storage
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATA_REDIS_HOST: msa-redis
      SPRING_DATA_REDIS_PORT: 6379
      
      # [수정] 호스트명을 main-db에서 실제 DB 컨테이너 이름인 msa_core_db로 변경
      SPRING_DATASOURCE_URL: jdbc:postgresql://msa_core_db:5432/msa_core_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_RABBITMQ_HOST: rabbitmq

networks:
  msa-network:
    external: true