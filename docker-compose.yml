# core-service/docker-compose.yml
version: '3.8'

services:
  core-service:
    image: ssrabw/server1_core:latest
    container_name: core-service
    restart: always
    ports:
      - "8080:8080"
    networks:
      - msa-network    
    volumes:
      # 호스트 서버 스토리지와 컨테이너 내부 이미지 저장 경로 연결 (GCP Server 1 -> Core Service)
      - /home/ssrabw/images/core:/app/resources/static/images
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATA_REDIS_HOST: msa-redis
      SPRING_DATA_REDIS_PORT: 6379     
      SPRING_DATASOURCE_URL: jdbc:postgresql://msa_core_db:5432/msa_core_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      
      SPRING_RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}   
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}

networks:
  msa-network:
    external: true