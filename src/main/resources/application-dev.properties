# [Project Setup]
spring.application.name=core

# [Server Settings]
server.port=8080

# --- UTF-8 인코딩 강제 설정 (중요) ---
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-response=true

# [File Storage Settings]
# 파일 환경: 로컬 컴퓨터의 파일 경로 (운영체제에 맞게 수정)
file.upload.dir=C:/msa_uploads/

# [Database Settings]
spring.datasource.url=jdbc:postgresql://34.50.7.72:5432/msa_core_db
spring.datasource.username=app_user
spring.datasource.password=user1234

# [MyBatis Settings]
# Mapper XML 위치
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.example.test.dto
mybatis.configuration.map-underscore-to-camel-case=true

# [Logging Settings]
logging.level.com.example.demo.mapper=debug

# [Security Settings]
spring.security.user.name=admin
spring.security.user.password=1234

# [JPA/Hibernate Settings]
# OSIV(Open Session In View) 비활성화 (성능 최적화)
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

