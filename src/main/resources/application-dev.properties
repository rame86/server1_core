# [Database Settings]
spring.datasource.url=jdbc:postgresql://34.50.7.72:5432/msa_core_db
spring.datasource.username=app_user
spring.datasource.password=user1234

# [MyBatis Settings]
# Mapper XML 위치
mybatis.mapper-locations=classpath:mappers/*.xml
# Model 패키지 경로
mybatis.type-aliases-package=com.example.test.dto
# DB 컬럼(snake_case)을 DTO(camelCase)로 자동 매핑
mybatis.configuration.map-underscore-to-camel-case=true

# [Logging Settings]
# SQL 로그 레벨 설정
logging.level.com.example.demo.mapper=debug

# [Security Settings]
spring.security.user.name=admin
spring.security.user.password=1234

# [JPA/Hibernate Settings]
# OSIV(Open Session In View) 비활성화 (성능 최적화)
spring.jpa.open-in-view=false
# 애플리케이션 실행 시 DB 스키마 자동 업데이트
spring.jpa.hibernate.ddl-auto=update
# 실행되는 SQL문 콘솔 출력
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

