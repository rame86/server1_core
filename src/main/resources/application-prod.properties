# [Project Setup]
spring.application.name=core

# [Profile Settings]
# 현재 활성화할 프로파일 지정 (개발 시 dev, 배포 시 prod)
#spring.profiles.active=prod

# [Server Settings]
server.port=8080

# --- UTF-8 인코딩 강제 설정 (한글 깨짐 방지) ---
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-response=true

# 스프링 부트 하위 버전 호환용
spring.http.encoding.charset=UTF-8
spring.http.encoding.enabled=true
spring.http.encoding.force=true
# --------------------------------------------

# [File Storage Settings]
# 배포 환경: 서버 내 절대 경로
file.upload.dir=/home/ubuntu/msa/storage/

# [Database Settings]
# 외부 PostgreSQL 서버 접속 정보 (Docker 구성 시 msa-network 활용 권장)
spring.datasource.url=jdbc:postgresql://34.50.7.72:5432/msa_core_db
spring.datasource.username=app_user
spring.datasource.password=user1234

# [MyBatis Settings]
# Mapper XML 파일 위치
mybatis.mapper-locations=classpath:mappers/*.xml
# Model 클래스 패키지 (Alias 설정)
mybatis.type-aliases-package=com.example.test.dto
# snake_case 컬럼을 camelCase 필드로 매핑
mybatis.configuration.map-underscore-to-camel-case=true

# [Logging Settings]
# SQL 로그 출력 (디버깅)
logging.level.com.example.demo.mapper=debug

# [Security Settings]
# 스프링 시큐리티 임시 계정
spring.security.user.name=admin
spring.security.user.password=1234

# [JPA/Hibernate Settings]
# OSIV 비활성화 (성능 및 커넥션 효율 최적화)
spring.jpa.open-in-view=false
# DB 테이블 자동 생성/수정
spring.jpa.hibernate.ddl-auto=update
# SQL 로그 출력 및 포맷팅
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

