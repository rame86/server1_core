# [Project Setup]
spring.application.name=core

# [Server Settings]
server.port=8080

# --- UTF-8 인코딩 강제 설정 ---
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-response=true

# [File Storage Settings]
# 배포 환경: Server 1(Core) 호스트 OS 경로 (사용자명 ssrabw 반영)
file.upload.dir=/app/resources/static/images/core

# [Database Settings]
# Docker Compose 내부 네트워크(msa-network)의 DB alias 활용
spring.datasource.url=jdbc:postgresql://main-db:5432/msa_core_db
spring.datasource.username=${POSTGRES_USER:app_user}
spring.datasource.password=${POSTGRES_PASSWORD:user1234}

# [MyBatis Settings]
mybatis.mapper-locations=classpath:mappers/*.xml
mybatis.type-aliases-package=com.example.test.dto
mybatis.configuration.map-underscore-to-camel-case=true

# [Logging Settings]
logging.level.com.example.demo.mapper=debug

# [Security Settings]
spring.security.user.name=admin
spring.security.user.password=1234

# [JPA/Hibernate Settings]
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

